name: Push

on:
  push:
    branches:
    - '**'
    - '!dependabot/**'

jobs:

  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    outputs:
      rust-version: ${{ steps.versions.outputs.rust-version }}
      wasmtime-stable-git-sha: ${{ steps.versions.outputs.wasmtime-stable-git-sha }}
      wasmtime-stable-version: ${{ steps.versions.outputs.wasmtime-stable-version }}
      wasmtime-stable-version-major: ${{ steps.versions.outputs.wasmtime-stable-version-major }}
      wasmtime-stable-version-minor: ${{ steps.versions.outputs.wasmtime-stable-version-minor }}
      wasmtime-stable-1-git-sha: ${{ steps.versions.outputs.wasmtime-stable-1-git-sha }}
      wasmtime-stable-1-version: ${{ steps.versions.outputs.wasmtime-stable-1-version }}
      wasmtime-stable-1-version-major: ${{ steps.versions.outputs.wasmtime-stable-1-version-major }}
      wasmtime-stable-1-version-minor: ${{ steps.versions.outputs.wasmtime-stable-1-version-minor }}
      wasmtime-lts-git-sha: ${{ steps.versions.outputs.wasmtime-lts-git-sha }}
      wasmtime-lts-version: ${{ steps.versions.outputs.wasmtime-lts-version }}
      wasmtime-lts-version-major: ${{ steps.versions.outputs.wasmtime-lts-version-major }}
      wasmtime-lts-version-minor: ${{ steps.versions.outputs.wasmtime-lts-version-minor }}
      wasmtime-lts-1-git-sha: ${{ steps.versions.outputs.wasmtime-lts-1-git-sha }}
      wasmtime-lts-1-version: ${{ steps.versions.outputs.wasmtime-lts-1-version }}
      wasmtime-lts-1-version-major: ${{ steps.versions.outputs.wasmtime-lts-1-version-major }}
      wasmtime-lts-1-version-minor: ${{ steps.versions.outputs.wasmtime-lts-1-version-minor }}
    steps:
    - uses: actions/checkout@v6
    - name: Resolve versions
      id: versions
      run: |
        set -euo pipefail

        echo "rust-version=$(yq -r '.toolchain.channel' rust-toolchain.toml)" | tee -a "${GITHUB_OUTPUT}"

        # stable
        wasmtime_stable_version="v$(cd versions/stable ; yq -p toml -oj -r '.package[] | select(.name == "wasmtime-cli") | .version' Cargo.lock)"
        wasmtime_stable_git_sha="$(gh api "repos/bytecodealliance/wasmtime/commits/refs/tags/${wasmtime_stable_version}" --template '{{.sha}}'))"
        echo "wasmtime-stable-version=${wasmtime_stable_version}" | tee -a "${GITHUB_OUTPUT}"
        echo "wasmtime-stable-version-major=$(echo "${wasmtime_stable_version}" | cut -d. -f1)" | tee -a "${GITHUB_OUTPUT}"
        echo "wasmtime-stable-version-minor=$(echo "${wasmtime_stable_version}" | cut -d. -f1-2)" | tee -a "${GITHUB_OUTPUT}"
        echo "wasmtime-stable-git-sha=${wasmtime_stable_git_sha}" | tee -a "${GITHUB_OUTPUT}"

        # stable, minus 1
        wasmtime_stable_1_version="v$(cd versions/stable-1 ; yq -p toml -oj -r '.package[] | select(.name == "wasmtime-cli") | .version' Cargo.lock)"
        wasmtime_stable_1_git_sha="$(gh api "repos/bytecodealliance/wasmtime/commits/refs/tags/${wasmtime_stable_1_version}" --template '{{.sha}}'))"
        echo "wasmtime-stable-1-version=${wasmtime_stable_1_version}" | tee -a "${GITHUB_OUTPUT}"
        echo "wasmtime-stable-1-version-major=$(echo "${wasmtime_stable_1_version}" | cut -d. -f1)" | tee -a "${GITHUB_OUTPUT}"
        echo "wasmtime-stable-1-version-minor=$(echo "${wasmtime_stable_1_version}" | cut -d. -f1-2)" | tee -a "${GITHUB_OUTPUT}"
        echo "wasmtime-stable-1-git-sha=${wasmtime_stable_1_git_sha}" | tee -a "${GITHUB_OUTPUT}"

        # lts
        wasmtime_lts_version="v$(cd versions/lts ; yq -p toml -oj -r '.package[] | select(.name == "wasmtime-cli") | .version' Cargo.lock)"
        wasmtime_lts_git_sha="$(gh api "repos/bytecodealliance/wasmtime/commits/refs/tags/${wasmtime_lts_version}" --template '{{.sha}}'))"
        echo "wasmtime-lts-version=${wasmtime_lts_version}" | tee -a "${GITHUB_OUTPUT}"
        echo "wasmtime-lts-version-major=$(echo "${wasmtime_lts_version}" | cut -d. -f1)" | tee -a "${GITHUB_OUTPUT}"
        echo "wasmtime-lts-version-minor=$(echo "${wasmtime_lts_version}" | cut -d. -f1-2)" | tee -a "${GITHUB_OUTPUT}"
        echo "wasmtime-lts-git-sha=${wasmtime_lts_git_sha}" | tee -a "${GITHUB_OUTPUT}"

        # lts, minus 1
        wasmtime_lts_1_version="v$(cd versions/lts-1 ; yq -p toml -oj -r '.package[] | select(.name == "wasmtime-cli") | .version' Cargo.lock)"
        wasmtime_lts_1_git_sha="$(gh api "repos/bytecodealliance/wasmtime/commits/refs/tags/${wasmtime_lts_1_version}" --template '{{.sha}}'))"
        echo "wasmtime-lts-1-version=${wasmtime_lts_1_version}" | tee -a "${GITHUB_OUTPUT}"
        echo "wasmtime-lts-1-version-major=$(echo "${wasmtime_lts_1_version}" | cut -d. -f1)" | tee -a "${GITHUB_OUTPUT}"
        echo "wasmtime-lts-1-version-minor=$(echo "${wasmtime_lts_1_version}" | cut -d. -f1-2)" | tee -a "${GITHUB_OUTPUT}"
        echo "wasmtime-lts-1-git-sha=${wasmtime_lts_1_git_sha}" | tee -a "${GITHUB_OUTPUT}"
      env:
        GH_TOKEN: ${{ github.token }}

  publish:
    name: Publish
    permissions:
      packages: write
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
        - wasmtime-crate: ${{ needs.preflight.outputs.wasmtime-stable-version }}
          wasmtime-git-sha: ${{ needs.preflight.outputs.wasmtime-stable-git-sha }}
          tag: ${{ needs.preflight.outputs.wasmtime-stable-version }}
          additional-tags: |
            ${{ needs.preflight.outputs.wasmtime-stable-version-minor }}
            ${{ needs.preflight.outputs.wasmtime-stable-version-major }}
            stable
            latest
        - wasmtime-crate: ${{ needs.preflight.outputs.wasmtime-stable-1-version }}
          wasmtime-git-sha: ${{ needs.preflight.outputs.wasmtime-stable-1-git-sha }}
          tag: ${{ needs.preflight.outputs.wasmtime-stable-1-version }}
          additional-tags: |
            ${{ needs.preflight.outputs.wasmtime-stable-1-version-minor }}
            ${{ needs.preflight.outputs.wasmtime-stable-1-version-major }}
            stable-1
            latest-1
        - wasmtime-crate: ${{ needs.preflight.outputs.wasmtime-lts-version }}
          wasmtime-git-sha: ${{ needs.preflight.outputs.wasmtime-lts-git-sha }}
          tag: ${{ needs.preflight.outputs.wasmtime-lts-version }}
          additional-tags: |
            ${{ needs.preflight.outputs.wasmtime-lts-version-major }}
            ${{ needs.preflight.outputs.wasmtime-lts-version-minor }}
            lts
        - wasmtime-crate: ${{ needs.preflight.outputs.wasmtime-lts-1-version }}
          wasmtime-git-sha: ${{ needs.preflight.outputs.wasmtime-lts-1-git-sha }}
          tag: ${{ needs.preflight.outputs.wasmtime-lts-1-version }}  
          additional-tags: |
            ${{ needs.preflight.outputs.wasmtime-lts-1-version-minor }}
            ${{ needs.preflight.outputs.wasmtime-lts-1-version-major }}
            lts-1
    uses: ./.github/workflows/publish.yaml
    with:
      rust-version: "${{ needs.preflight.outputs.rust-version }}"
      wasmtime-crate: "${{ matrix.wasmtime-crate }}"
      wasmtime-git-sha: "${{ matrix.wasmtime-git-sha }}"
      tag: "${{ matrix.tag }}"
      additional-tags: "${{ matrix.additional-tags }}"
      publish: ${{ github.ref == 'refs/heads/main' }}
    secrets: inherit

  done:
    # used as a non-matrix job for protected branches
    name: Done
    needs: publish
    if: always() && (needs.publish.result == 'success' || needs.publish.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
    - run: echo "That's all folks"
